name: Cập nhật tin tức (Bến Hàng Hóa)

# Tự chạy 2 LẦN/GIỜ (phút :25 và :55) + cho phép bấm chạy tay trong tab Actions.
# ⚠️ KHÔNG đặt phút :00 — đầu giờ GitHub kẹt tải nặng nhất, free tier hay BỎ QUA
#    lịch chạy. Dời sang phút lẻ (:25/:55) để chạy đáng tin cậy hơn nhiều.
# Web đọc tin trực tiếp từ GitHub raw nên cập nhật KHÔNG tốn build Cloudflare
# (cần loại public/data/news.json khỏi "Build watch paths" của Cloudflare Pages).
on:
  schedule:
    - cron: "25,55 * * * *"   # phút :25 và :55 mỗi giờ (UTC) — tránh đầu giờ kẹt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Chạy bot lấy + dịch tin
        run: node scripts/fetch-news.mjs

      - name: Commit news.json nếu có thay đổi
        run: |
          git config user.name  "benhanghoa-bot"
          git config user.email "bot@benhanghoa.local"
          git add public/data/news.json
          if git diff --staged --quiet; then
            echo "Không có tin mới."
          else
            git commit -m "chore: cập nhật tin tức tự động"
            git push
          fi
